name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  build-portable:
    name: Build Windows Portable
    runs-on: windows-2022
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
    
    steps:
      # --- 1. RUSTDESK SOURCE ---
      - name: Checkout RustDesk Source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ github.event.inputs.rustdesk_ref || github.ref_name }}
          submodules: recursive
          path: source

      # --- 2. DEIN BRANDING ---
      - name: Checkout My Branding
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: main
          path: branding

      # --- 3. BRANDING INJEZIEREN (MIT LOGGING) ---
      - name: Inject Branding into Source
        shell: bash
        run: |
          echo "=========================================="
          echo "       STARTE BRANDING INJECTION"
          echo "=========================================="
          
          echo "--- Inhalt des Branding-Repos ---"
          ls -R branding
          echo "---------------------------------"

          echo "Kopiere Branding Dateien nach 'source'..."
          
          # Logo
          if [ -f "branding/BRANDING/logo.png" ]; then
             echo "✅ logo.png gefunden. Erstelle Zielordner..."
             mkdir -p source/flutter/assets/images
             
             echo "Kopiere logo.png..."
             cp -v "branding/BRANDING/logo.png" "source/flutter/assets/images/logo.png"
             
             echo "Suche und ersetze weitere Logos..."
             find source/flutter -name "logo.png" -exec cp -v "branding/BRANDING/logo.png" {} + || true
          else
             echo "❌ ACHTUNG: branding/BRANDING/logo.png NICHT gefunden!"
          fi
          
          # Icon
          if [ -f "branding/BRANDING/app_icon.ico" ]; then
             echo "✅ app_icon.ico gefunden. Erstelle Zielordner..."
             mkdir -p source/flutter/windows/runner/resources
             
             echo "Kopiere app_icon.ico..."
             cp -v "branding/BRANDING/app_icon.ico" "source/flutter/windows/runner/resources/app_icon.ico"
          else
             echo "❌ ACHTUNG: branding/BRANDING/app_icon.ico NICHT gefunden!"
          fi
          
          echo "--- Bereinige Branding-Repo ---"
          rm -rf branding
          echo "Branding abgeschlossen."

      # --- 4. VERSIONIERUNG ---
      - name: Setup Environment Variables
        shell: bash
        run: |
          DATE_STR=$(date +'%Y.%m.%d-%H%M')
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
             VERSION_NAME="${{ github.ref_name }}_${DATE_STR}"
          else
             VERSION_NAME="custom_${{ github.event.inputs.rustdesk_ref }}_${DATE_STR}"
          fi
          VERSION_NAME=$(echo "$VERSION_NAME" | sed 's|/|-|g')
          
          echo "VERSION_TAG=$VERSION_NAME" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=3.24.5" >> $GITHUB_ENV
          
          echo "Build-Version gesetzt auf: $VERSION_NAME"

      # --- 5. KONFIGURATION (MIT LOGGING) ---
      - name: Apply Config & Server Settings
        shell: bash
        working-directory: source
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          echo "=========================================="
          echo "       STARTE KONFIGURATION"
          echo "=========================================="

          # App Name
          if [ -n "$MY_APP_NAME" ]; then
             echo "Setze App-Namen auf: $MY_APP_NAME"
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             # Wir nutzen grep, um zu prüfen, ob die Änderung geklappt hat (
