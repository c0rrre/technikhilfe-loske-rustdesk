name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  build-portable:
    name: Build Windows Portable
    runs-on: windows-2022
    env:
      # Globale Variablen
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
      VCPKG_ROOT: C:\vcpkg
      # WICHTIG: Damit VCPKG System-Tools (NASM/YASM) findet!
      VCPKG_KEEP_ENV_VARS: "PATH;INCLUDE;LIB;LIBPATH"
    
    steps:
      # --- 1. ZUSAMMENFÜHREN DER REPOS ---
      - name: Checkout & Merge Repositories
        shell: bash
        run: |
          echo "1. Klone RustDesk Source..."
          git clone https://github.com/rustdesk/rustdesk.git rustdesk_src
          
          # Version wechseln (Tag oder Master)
          cd rustdesk_src
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          # Falls es ein Tag ist (bei automatischem Auslöser)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          echo "Checke Version aus: $REF"
          git checkout "$REF" || git checkout master
          cd ..

          echo "2. Klone mein Branding Repo..."
          # Wir klonen das aktuelle Repo (in dem der Workflow läuft)
          git clone "https://github.com/${{ github.repository }}.git" my_branding_src
          
          echo "3. Verschiebe ALLES ins Hauptverzeichnis..."
          # RustDesk Code ins Root verschieben
          cp -r rustdesk_src/* .
          cp -r rustdesk_src/.* . 2>/dev/null || true
          
          # Branding Ordner ins Root holen
          if [ -d "my_branding_src/BRANDING" ]; then
             cp -r my_branding_src/BRANDING .
             echo "✅ BRANDING Ordner erfolgreich platziert."
          else
             echo "⚠️ WARNUNG: Kein BRANDING Ordner im Repo gefunden!"
          fi
          
          # Aufräumen
          rm -rf rustdesk_src my_branding_src
          
          echo "Dateistruktur:"
          ls -la

      # --- 2. VERSIONIERUNG ---
      - name: Setup Environment Variables
        shell: bash
        run: |
          echo "VERSION_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=3.24.5" >> $GITHUB_ENV

      # --- 3. BRANDING ANWENDEN (Dein Original-Code) ---
      - name: Apply Custom Branding
        shell: bash
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          echo "Wende Branding an..."
          
          if [ -n "$MY_APP_NAME" ]; then
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             find flutter -name "main.cpp" -exec sed -i "s|L\"RustDesk\"|L\"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"FileDescription\", \"RustDesk\"|VALUE \"FileDescription\", \"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"ProductName\", \"RustDesk\"|VALUE \"ProductName\", \"$MY_APP_NAME\"|g" {} +
          fi

          if [ -f "BRANDING/logo.png" ]; then
             echo "Kopiere logo.png..."
             mkdir -p flutter/assets/images
             cp "BRANDING/logo.png" "flutter/assets/images/logo.png"
             find flutter -name "logo.png" -exec cp "BRANDING/logo.png" {} + || true
          fi

          if [ -f "BRANDING/app_icon.ico" ]; then
             echo "Kopiere app_icon.ico..."
             mkdir -p flutter/windows/runner/resources
             cp "BRANDING/app_icon.ico" "flutter/windows/runner/resources/app_icon.ico"
          fi

      # --- 4. SERVER KONFIGURATION (Mit ID_SERVER Fix) ---
      - name: Inject Server Configuration
        shell: bash
        env:
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          # Fallback auf Rendezvous Server, falls ID Server nicht gesetzt
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          echo "Suche Konfigurationsdateien..."
          TARGETS=("src/config.rs" "libs/hbb_common/src/config.rs")
          
          for CONF in "${TARGETS[@]}"; do
            if [ -f "$CONF" ]; then
              echo "Bearbeite: $CONF"
              sed -i "s|^.*pub const API_SERVER:.*$|pub const API_SERVER: \&'static str = \"$VAL_API\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVER:.*$|pub const RENDEZVOUS_SERVER: \&'static str = \"$VAL_REND\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVERS:.*$|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$VAL_REND\"];|g" "$CONF"
              # Wichtig: ID Server setzen
              sed -i "s|^.*pub const ID_SERVER:.*$|pub const ID_SERVER: \&'static str = \"$VAL_ID\";|g" "$CONF"
              sed -i "s|^.*pub const RS_PUB_KEY:.*$|pub const RS_PUB_KEY: \&'static str = \"$VAL_KEY\";|g" "$CONF"
              echo "Konfiguration angewendet."
            fi
          done

      # --- 5. BUILD TOOLS INSTALLIEREN ---
      - name: Install Build Tools
        shell: powershell
        run: |
          # Wir installieren NASM und YASM systemweit (Wichtig für VCPKG/FFmpeg)
          choco install llvm nasm yasm -y
          # Pfad hinzufügen
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # --- 6. VCPKG & DEPENDENCIES (Der Fix für die Fehler) ---
      - name: Install vcpkg Dependencies
        shell: bash
        run: |
          # 1. Manifest deaktivieren (Classic Mode erzwingen)
          # Das ist nötig, um FFmpeg manuell mit allen Codecs zu installieren
          if [ -f "vcpkg.json" ]; then
             echo "Deaktiviere Manifest Mode (vcpkg.json -> vcpkg.json.bak)"
             mv vcpkg.json vcpkg.json.bak
          fi

          # 2. VCPKG Setup
          rm -rf C:/vcpkg
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          pushd C:/vcpkg
          # Wir nutzen einen stabilen Commit
          git reset --hard 120deac3062162151622ca4860575a33844ba10b
          popd
          C:/vcpkg/bootstrap-vcpkg.bat

          # 3. Installation (FFmpeg explizit!)
          echo "Installiere Libraries (Das dauert kurz)..."
          C:/vcpkg/vcpkg install \
            libvpx libyuv opus aom ffmpeg \
            --triplet x64-windows-static \
            --recurse

          # 4. Check
          if [ -f "C:/vcpkg/installed/x64-windows-static/include/libavutil/pixfmt.h" ]; then
             echo "✅ SUCCESS: FFmpeg Header gefunden!"
          else
             echo "❌ FAILURE: FFmpeg Header fehlen! Build wird scheitern."
             exit 1
          fi

      # --- 7. BRIDGE GENERIEREN ---
      - name: Generate Flutter Rust Bridge
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          pushd flutter
          flutter pub get
          popd
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --rust-output src/bridge_generated.rs \
            --c-output flutter/windows/runner/bridge_generated.h

      # --- 8. KOMPILIEREN ---
      - name: Build RustDesk Application
        shell: powershell
        # Hier übergeben wir die Pfade explizit an den Compiler
        env:
          INCLUDE: C:\vcpkg\installed\x64-windows-static\include
          LIB: C:\vcpkg\installed\x64-windows-static\lib
          LIBPATH: C:\vcpkg\installed\x64-windows-static\lib
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
        run: |
          Write-Host "Start Build Script..."
          
          # Pfad für NASM sicherstellen
          $env:PATH += ";C:\Program Files\NASM"

          python build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          
          $sourceDir = "flutter\build\windows\x64\runner\Release"
          Write-Host "Prüfe auf Build Output in: $sourceDir"
          
          if (-not (Test-Path $sourceDir)) {
            Write-Error "FEHLER: Build Output nicht gefunden! (Compiler abgestürzt)"
            exit 1
          }
          
          Write-Host "Gefunden! Verschiebe..."
          Move-Item -Path $sourceDir -Destination "rustdesk" -Force

      # --- 9. PACKEN ---
      - name: Pack Portable Executable
        shell: powershell
        run: |
          Push-Location ./libs/portable
          pip install -r requirements.txt
          
          $exeFile = Get-ChildItem -Path "../../rustdesk" -Filter "*.exe" | Select-Object -First 1
          if (-not $exeFile) { 
            Write-Error "KEINE EXE GEFUNDEN"
            exit 1 
          }
          
          Write-Host "Packe EXE: $($exeFile.Name)"
          python generate.py -f "../../rustdesk/" -o . -e "$($exeFile.Name)"
          Pop-Location
          
          New-Item -ItemType Directory -Path "release_output" -Force | Out-Null
          
          $packed = Get-ChildItem -Path "libs/portable" -Filter "*packer.exe" | Select-Object -First 1
          
          if ($packed) {
              $finalName = "./release_output/${{ secrets.APP_NAME }}_Portable_${{ env.VERSION_TAG }}.exe"
              Move-Item $packed.FullName $finalName -Force
              Write-Host "ERFOLG! Datei erstellt: $finalName"
          } else {
              Write-Error "Packen fehlgeschlagen."
              exit 1
          }

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          files: release_output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
