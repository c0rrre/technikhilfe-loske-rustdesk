name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1 – PREPARE SOURCE
  # ==========================================
  prepare-source:
    runs-on: windows-2022
    outputs:
      version_tag: ${{ steps.vars.outputs.VERSION_TAG }}
    steps:
      - name: Checkout RustDesk
        shell: bash
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk_src
          cd rustdesk_src
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          git checkout "$REF" || git checkout master
          git submodule update --init --recursive
          cd ..

      - name: Checkout Branding Repo
        shell: bash
        run: |
          git clone "https://github.com/${{ github.repository }}.git" my_branding_src

      - name: Merge Source + Branding
        shell: bash
        run: |
          cp -r rustdesk_src/* .
          cp -r rustdesk_src/.* . 2>/dev/null || true
          if [ -d "my_branding_src/BRANDING" ]; then
            cp -r my_branding_src/BRANDING .
          fi
          rm -rf rustdesk_src my_branding_src

      - name: Set Version
        id: vars
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          DATE=$(date +'%Y-%m-%d-%H-%M')
          echo "VERSION_TAG=${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Upload Prepared Source
        uses: actions/upload-artifact@v4
        with:
          name: source-prepared
          path: .
          exclude: |
            .git
            target
            vcpkg

  # ==========================================
  # JOB 2 – PREPARE DEPENDENCIES (CACHED)
  # ==========================================
  prepare-deps:
    needs: prepare-source
    runs-on: windows-2022
    env:
      FLUTTER_VERSION: '3.24.5'
      VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-prepared
          path: .

      - uses: ilammy/msvc-dev-cmd@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      # Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: pub-${{ hashFiles('flutter/pubspec.lock') }}

      # VCPKG
      - name: Cache VCPKG
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ env.VCPKG_COMMIT_ID }}

      - name: Install VCPKG (only if cache miss)
    if: steps.vcpkg-cache.outputs.cache-hit != 'true'
    shell: pwsh
    run: |
      if (-not (Test-Path $env:VCPKG_ROOT)) {
          git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
      }
      cd $env:VCPKG_ROOT
      git fetch
      git checkout $env:VCPKG_COMMIT_ID
      .\bootstrap-vcpkg.bat
  
      # Im Manifest Mode: build dependencies im Projektpfad installieren
      cd ${{ github.workspace }}
      $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
      .\vcpkg\vcpkg install ffmpeg:x64-windows-static --triplet x64-windows-static
      .\vcpkg\vcpkg install opus:x64-windows-static --triplet x64-windows-static
      .\vcpkg\vcpkg install libvpx:x64-windows-static --triplet x64-windows-static
      .\vcpkg\vcpkg install libyuv:x64-windows-static --triplet x64-windows-static
      .\vcpkg\vcpkg install aom:x64-windows-static --triplet x64-windows-static
        # Flutter Rust Bridge
        - name: Install flutter_rust_bridge_codegen
          run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --force

      - name: Generate Bridge
        shell: pwsh
        run: |
          Push-Location flutter
          flutter pub get
          Pop-Location
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart `
            --rust-output src/bridge_generated.rs `
            --c-output flutter/windows/runner/bridge_generated.h

      - uses: actions/upload-artifact@v4
        with:
          name: shared-bridge
          path: |
            flutter/lib/generated_bridge.dart
            src/bridge_generated.rs
            flutter/windows/runner/bridge_generated.h

  # ==========================================
  # JOB 3 – BUILD MATRIX
  # ==========================================
  build:
    needs: [prepare-source, prepare-deps]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, qs]
    env:
      VERSION_TAG: ${{ needs.prepare-source.outputs.version_tag }}
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-prepared
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: shared-bridge
          path: .

      - uses: ilammy/msvc-dev-cmd@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Restore VCPKG Cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-120deac3062162151622ca4860575a33844ba10b

      - name: Build Variant
        shell: pwsh
        run: |
          $vcpkgInclude = "$env:VCPKG_ROOT\installed\x64-windows-static\include"
          $vcpkgLib = "$env:VCPKG_ROOT\installed\x64-windows-static\lib"
          $env:INCLUDE = "$vcpkgInclude;$env:INCLUDE"
          $env:LIB = "$vcpkgLib;$env:LIB"
          $env:VCPKG_INSTALLATION_ROOT = $env:VCPKG_ROOT

          if ("${{ matrix.variant }}" -eq "qs") {
            Write-Host "Applying QuickSupport modifications..."
          }

          python build.py --portable --flutter --skip-portable-pack

          $buildDir = "flutter\build\windows\x64\runner\Release"
          $outDir = "build_output_${{ matrix.variant }}"
          New-Item -ItemType Directory -Path $outDir -Force

          if (Test-Path "$buildDir\*.exe") {
            Move-Item "$buildDir\*.exe" $outDir -Force
          } else {
            Write-Host "ERROR - Build fehlgeschlagen: Keine EXE gefunden."
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.variant }}
          path: build_output_${{ matrix.variant }}\*.exe

  # ==========================================
  # JOB 4 – RELEASE
  # ==========================================
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: exe-standard
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: exe-qs
          path: .

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-source.outputs.version_tag }}
          files: "*.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
