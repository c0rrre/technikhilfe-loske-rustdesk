name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  # --- JOB 1: PREPARE (Schnell, kaum Cache nötig) ---
  prepare-source:
    name: Prepare Source Code
    runs-on: windows-2022
    outputs:
      version_tag: ${{ steps.vars.outputs.VERSION_TAG }}
    steps:
      - name: Checkout & Merge Repositories
        shell: bash
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk_src
          cd rustdesk_src
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          git checkout "$REF" || git checkout master
          git submodule update --init --recursive
          cd ..
          
          git clone "https://github.com/${{ github.repository }}.git" my_branding_src
          
          cp -r rustdesk_src/* .
          cp -r rustdesk_src/.* . 2>/dev/null || true
          if [ -d "my_branding_src/BRANDING" ]; then
             cp -r my_branding_src/BRANDING .
          fi
          rm -rf rustdesk_src my_branding_src

      - name: Set Version Variables
        id: vars
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          DATE=$(date +'%Y-%m-%d-%H-%M')
          VERSION_TAG="${VERSION}-${DATE}"
          echo "VERSION_TAG=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Apply Branding (Common)
        shell: bash
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          if [ -n "$MY_APP_NAME" ]; then
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             find flutter -name "main.cpp" -exec sed -i "s|L\"RustDesk\"|L\"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"FileDescription\", \"RustDesk\"|VALUE \"FileDescription\", \"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"ProductName\", \"RustDesk\"|VALUE \"ProductName\", \"$MY_APP_NAME\"|g" {} +
          fi
          if [ -f "logo.png" ]; then
             mkdir -p flutter/assets/images
             cp "BRANDING/logo.png" "flutter/assets/images/logo.png" || true
          fi
          if [ -f "app_icon.ico" ]; then
             mkdir -p flutter/windows/runner/resources
             cp "BRANDING/app_icon.ico" "flutter/windows/runner/resources/app_icon.ico" || true
          fi

      - name: Inject Server Configuration
        shell: bash
        env:
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
        run: |
          TARGETS=("src/config.rs" "libs/hbb_common/src/config.rs")
          for CONF in "${TARGETS[@]}"; do
            if [ -f "$CONF" ]; then
              sed -i "s|^.*pub const ID_SERVER:.*$|pub const ID_SERVER: \&'static str = \"$VAL_ID\";|g" "$CONF"
              sed -i "s|^.*pub const API_SERVER:.*$|pub const API_SERVER: \&'static str = \"$VAL_API\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVER:.*$|pub const RENDEZVOUS_SERVER: \&'static str = \"$VAL_REND\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVERS:.*$|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$VAL_REND\"];|g" "$CONF"
              sed -i "s|^.*pub const RS_PUB_KEY:.*$|pub const RS_PUB_KEY: \&'static str = \"$VAL_KEY\";|g" "$CONF"
            fi
          done

      - name: Upload Prepared Source
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: .
          exclude: |
            .git
            target
            vcpkg

  # --- JOB 2: PARALLEL BUILD (SMART CACHING) ---
  build-matrix:
    name: Build ${{ matrix.variant }}
    needs: prepare-source
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, qs]
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
      VCPKG_ROOT: C:\vcpkg
      VCPKG_KEEP_ENV_VARS: "PATH;INCLUDE;LIB;LIBPATH"
      FLUTTER_VERSION: '3.24.5'
      VERSION_TAG: ${{ needs.prepare-source.outputs.version_tag }}
      # Wir definieren den VCPKG Commit hier fest, damit der Cache Key stabil bleibt
      VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'
    
    steps:
      - name: Download Prepared Source
        uses: actions/download-artifact@v4
        with:
          name: source-code
          path: .

      # --- SCHRITT 1: TOOLS (LLVM / NASM) ---
      # Wir prüfen erst, ob die Pfade existieren, bevor wir Chocolatey bemühen.
      - name: Check and Install Tools
        shell: powershell
        run: |
          $llvm = Test-Path "C:\Program Files\LLVM\bin"
          $nasm = Get-Command nasm -ErrorAction SilentlyContinue
          if (-not $llvm -or -not $nasm) {
             Write-Host "Tools missing. Installing..."
             choco install llvm nasm -y
          } else {
             Write-Host "✅ LLVM and NASM already installed. Skipping."
          }

      - name: Setup MSVC Dev Environment
        uses: ilammy/msvc-dev-cmd@v1

      # --- SCHRITT 2: RUST CACHE ---
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # swatinem/rust-cache ist intelligenter als der Standard-Cache.
      # Er hasht die Cargo.lock und cached den 'target' Ordner automatisch.
      # Wenn Dependencies gleich bleiben, ist der Restore extrem schnell.
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.variant }} # Separate Caches für Standard/QS um Locking-Probleme zu vermeiden

      # --- SCHRITT 3: FLUTTER CACHE ---
      # Die Action selbst hat eingebautes Caching für das SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true # Aktiviert den Cache für das Flutter SDK
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      # --- SCHRITT 4: VCPKG CACHE (Der wichtigste Teil) ---
      # Wir cachen C:\vcpkg komplett. Key ist OS + Commit-ID.
      - name: Restore VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}-full
      
      # Dieser Schritt läuft NUR, wenn der Cache NICHT gefunden wurde.
      - name: Install VCPKG (If not cached)
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Write-Host "Cache miss. Installing VCPKG from scratch..."
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
          }
          cd C:\vcpkg
          git fetch
          git reset --hard ${{ env.VCPKG_COMMIT_ID }}
          .\bootstrap-vcpkg.bat
          
          # Installieren der Libs
          .\vcpkg install ffmpeg:x64-windows-static
          .\vcpkg install opus:x64-windows-static
          .\vcpkg install libvpx:x64-windows-static
          .\vcpkg install libyuv:x64-windows-static
          .\vcpkg install aom:x64-windows-static

      # --- SCHRITT 5: BUILD VORBEREITUNG ---
      - name: Generate Flutter Rust Bridge
        shell: powershell
        run: |
          # Prüfen ob codegen schon da ist, spart Zeit
          if (-not (Get-Command flutter_rust_bridge_codegen -ErrorAction SilentlyContinue)) {
             cargo install flutter_rust_bridge_codegen --version 1.80.1
          }
          Push-Location flutter
          flutter pub get
          Pop-Location
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart --rust-output src/bridge_generated.rs --c-output flutter/windows/runner/bridge_generated.h

      - name: Apply QuickSupport Mods (Only if QS)
        if: matrix.variant == 'qs'
        shell: bash
        env:
          QS_TARGET: ${{ secrets.QS_TARGET_ID }}
        run: |
          echo "🔧 Wende QuickSupport Modifikationen an..."
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/Icons.settings/Icons.check_box_outline_blank/g'
          if [ -n "$QS_TARGET" ]; then
             find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i "s|TextEditingController();|TextEditingController(text: \"$QS_TARGET\");|g"
          fi
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/autofocus: true/readOnly: true, autofocus: false/g'
          echo "✅ QuickSupport Modifikationen fertig."

      # --- SCHRITT 6: BUILD (INKREMENTELL) ---
      # Cargo wird dank rust-cache nur die geänderten Teile kompilieren.
      # Flutter muss bauen, da wir den Code geändert haben (Branding/Mods).
      - name: Build Application
        shell: powershell
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          CARGO_INCREMENTAL: 1 # Aktiviert für schnelleren Rebuild
        run: |
          python build.py --portable --flutter --skip-portable-pack
          
          $buildDir = "flutter\build\windows\x64\runner\Release"
          $destDir = "build_output_${{ matrix.variant }}"
          New-Item -ItemType Directory -Path $destDir -Force
          Move-Item -Path "$buildDir\*" -Destination $destDir -Force

      # --- SCHRITT 7: PACKEN ---
      - name: Pack Portable Executable
        shell: powershell
        run: |
          Push-Location ./libs/portable
          pip install -r requirements.txt
          $srcDir = "../../build_output_${{ matrix.variant }}"
          $exeFile = Get-ChildItem -Path $srcDir -Filter "*.exe" | Select-Object -First 1
          
          python generate.py -f "$srcDir/" -o . -e "$($exeFile.Name)"
          Pop-Location
          
          $packed = Get-ChildItem -Path ./libs/portable -Recurse -Filter "*packer.exe" | Select-Object -First 1
          
          $prefix = "${{ secrets.APP_NAME }}"
          if ("${{ matrix.variant }}" -eq "qs") {
            $finalName = "${prefix}_QuickSupport_${{ env.VERSION_TAG }}.exe"
          } else {
            $finalName = "${prefix}_Portable_${{ env.VERSION_TAG }}.exe"
          }
          
          Move-Item $packed.FullName -Destination ".\$finalName" -Force
          echo "ARTIFACT_PATH=$finalName" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.variant }}
          path: ${{ env.ARTIFACT_PATH }}

  # --- JOB 3: RELEASE ---
  release:
    name: Publish Release
    needs: [prepare-source, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Download Standard Artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-standard
          path: .

      - name: Download QS Artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-qs
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-source.outputs.version_tag }}
          files: |
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
