name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  build-portable:
    name: Build Windows Portable
    runs-on: windows-2022
    env:
      # Globale Variablen
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
      VCPKG_ROOT: C:\vcpkg
      # WICHTIG: Damit VCPKG unsere manuell installierten Tools (NASM) findet!
      VCPKG_KEEP_ENV_VARS: "PATH;INCLUDE;LIB;LIBPATH"
    
    steps:
      # --- 1. ZUSAMMENFÜHREN DER REPOS ---
      - name: Checkout & Merge Repositories
        shell: bash
        run: |
          echo "1. Klone RustDesk Source (RECURSIVE)..."
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk_src
          
          cd rustdesk_src
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          echo "Checke Version aus: $REF"
          git checkout "$REF" || git checkout master
          git submodule update --init --recursive
          cd ..

          echo "2. Klone Branding Repo..."
          git clone "https://github.com/${{ github.repository }}.git" my_branding_src
          
          echo "3. Verschiebe Dateien ins Hauptverzeichnis..."
          cp -r rustdesk_src/* .
          cp -r rustdesk_src/.* . 2>/dev/null || true
          if [ -d "my_branding_src/BRANDING" ]; then
             cp -r my_branding_src/BRANDING .
             echo "✅ BRANDING Dateien platziert."
          fi
          rm -rf rustdesk_src my_branding_src
          ls -F libs/hbb_common/

      # --- 2. ENVIRONMENT VARIABLES ---
      - name: Setup Environment Variables
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          DATE=$(date +'%Y-%m-%d-%H-%M')
          VERSION_TAG="${VERSION}-${DATE}"
          echo "VERSION_TAG=${VERSION_TAG}" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=3.24.5" >> $GITHUB_ENV
          echo "Generated VERSION_TAG=${VERSION_TAG}"

      # --- 3. BRANDING ---
      - name: Apply Custom Branding
        shell: bash
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          if [ -n "$MY_APP_NAME" ]; then
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             find flutter -name "main.cpp" -exec sed -i "s|L\"RustDesk\"|L\"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"FileDescription\", \"RustDesk\"|VALUE \"FileDescription\", \"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"ProductName\", \"RustDesk\"|VALUE \"ProductName\", \"$MY_APP_NAME\"|g" {} +
          fi
          if [ -f "logo.png" ]; then
             mkdir -p flutter/assets/images
             cp "BRANDING/logo.png" "flutter/assets/images/logo.png"
             find flutter -name "logo.png" -exec cp "logo.png" {} + || true
          fi
          if [ -f "app_icon.ico" ]; then
             mkdir -p flutter/windows/runner/resources
             cp "BRANDING/app_icon.ico" "flutter/windows/runner/resources/app_icon.ico"
          fi

      # --- 4. SERVER CONFIGURATION ---
      - name: Inject Server Configuration
        shell: bash
        env:
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
        run: |
          TARGETS=("src/config.rs" "libs/hbb_common/src/config.rs")
          for CONF in "${TARGETS[@]}"; do
            if [ -f "$CONF" ]; then
              sed -i "s|^.*pub const ID_SERVER:.*$|pub const ID_SERVER: \&'static str = \"$VAL_ID\";|g" "$CONF"
              sed -i "s|^.*pub const API_SERVER:.*$|pub const API_SERVER: \&'static str = \"$VAL_API\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVER:.*$|pub const RENDEZVOUS_SERVER: \&'static str = \"$VAL_REND\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVERS:.*$|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$VAL_REND\"];|g" "$CONF"
              sed -i "s|^.*pub const RS_PUB_KEY:.*$|pub const RS_PUB_KEY: \&'static str = \"$VAL_KEY\";|g" "$CONF"
            fi
          done

      # --- 5. BUILD TOOLS ---
      - name: Install Build Tools (LLVM & NASM)
        shell: powershell
        run: choco install llvm nasm -y

      - name: Setup MSVC Dev Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # --- 6. RUST/CARGO CACHE ---
      - name: Cache Rust Target
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rustdesk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rustdesk-${{ runner.os }}-

      # --- 7. FLUTTER ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter/.dart_tool
          key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('flutter/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-

      # --- 8a. Setup vcpkg ---
      - name: Setup vcpkg
        shell: powershell
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
          }
          cd C:\vcpkg
          git fetch
          git reset --hard 120deac3062162151622ca4860575a33844ba10b
          .\bootstrap-vcpkg.bat
      
      # --- 8b. Cache Basis-Pakete (ohne libmfx) ---
      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed\x64-windows-static\lib
            C:\vcpkg\installed\x64-windows-static\include
          key: vcpkg-${{ runner.os }}-120deac3062162151622ca224860575a33844ba10b-basis
      
      # --- 8c. Install vcpkg Dependencies ---
      - name: Install vcpkg Dependencies
        shell: powershell
        run: |
          cd C:\vcpkg
          # Basis-Pakete (werden ggf. aus Cache geladen)
          .\vcpkg install ffmpeg:x64-windows-static
          .\vcpkg install opus:x64-windows-static
          .\vcpkg install libvpx:x64-windows-static
          .\vcpkg install libyuv:x64-windows-static
          .\vcpkg install aom:x64-windows-static
      
      # --- 9. PYTHON PIP CACHE (Optional) ---
      - name: Cache Python Pip
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('libs/portable/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # --- 10. GENERATE BRIDGE ---
      - name: Generate Flutter Rust Bridge
        shell: powershell
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          Push-Location flutter
          flutter pub get
          Pop-Location
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart --rust-output src/bridge_generated.rs --c-output flutter/windows/runner/bridge_generated.h

      # --- 11. BUILD APPLICATION ---
      - name: Build RustDesk Application
        shell: powershell
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          CARGO_INCREMENTAL: 0
        run: |
          python build.py --portable --flutter --vram --skip-portable-pack
          $sourceDir = "flutter\build\windows\x64\runner\Release"
          if (-not (Test-Path $sourceDir)) { exit 1 }
          Move-Item -Path $sourceDir -Destination "rustdesk" -Force

      # --- 12. CHECK HARDWARE ENCODER STATUS ---
      - name: Check Hardware Encoder Status
        shell: powershell
        run: |
          function Check($name, $condition) {
            if ($condition) { Write-Host "✅ $name" } else { Write-Host "❌ $name" }
          }
          Check "NVIDIA NVENC" (Test-Path "C:\Program Files\NVIDIA GPU Computing Toolkit")
          Check "AMD AMF (via FFmpeg)" (Test-Path "C:\vcpkg\installed\x64-windows-static\lib\avcodec.lib")
          Check "Intel QSV (oneVPL)" (Test-Path "C:\vcpkg\installed\x64-windows-static\lib\vpl.lib")
          Check "VP8/VP9 (libvpx)" (Test-Path "C:\vcpkg\installed\x64-windows-static\lib\vpx.lib")
          Check "AV1 (AOM)" (Test-Path "C:\vcpkg\installed\x64-windows-static\lib\aom.lib")

      # --- 13. PACK PORTABLE EXECUTABLE ---
      - name: Pack Portable Executable
        shell: powershell
        run: |
          Push-Location ./libs/portable
          pip install -r requirements.txt
          $exeFile = Get-ChildItem -Path "../../rustdesk" -Filter "*.exe" | Select-Object -First 1
          python generate.py -f "../../rustdesk/" -o . -e "$($exeFile.Name)"
          Pop-Location
          New-Item -ItemType Directory -Path "release_output" -Force | Out-Null
          $packed = Get-ChildItem -Path . -Recurse -Filter "*packer.exe" | Select-Object -First 1
          if ($packed) {
              $finalName = "./release_output/${{ secrets.APP_NAME }}_Portable_${{ env.VERSION_TAG }}.exe"
              Move-Item $packed.FullName $finalName -Force
          } else { exit 1 }

      # --- 14. PUBLISH RELEASE ---
      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          files: release_output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
