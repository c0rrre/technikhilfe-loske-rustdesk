name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  build-portable:
    name: Build Windows Portable
    runs-on: windows-2022
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
      # WICHTIG: Erlaubt VCPKG, die System-Tools (NASM/YASM) zu nutzen!
      VCPKG_KEEP_ENV_VARS: "PATH;INCLUDE;LIB;LIBPATH"
    
    steps:
      # --- 1. RUSTDESK SOURCE ---
      - name: Checkout RustDesk Source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ github.event.inputs.rustdesk_ref || github.ref_name }}
          submodules: recursive
          path: source

      # --- 2. BRANDING ---
      - name: Checkout My Branding
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: main
          path: branding

      - name: Inject Branding
        shell: bash
        run: |
          if [ -f "branding/BRANDING/logo.png" ]; then
             mkdir -p source/flutter/assets/images
             cp "branding/BRANDING/logo.png" "source/flutter/assets/images/logo.png"
             find source/flutter -name "logo.png" -exec cp "branding/BRANDING/logo.png" {} + || true
          fi
          if [ -f "branding/BRANDING/app_icon.ico" ]; then
             mkdir -p source/flutter/windows/runner/resources
             cp "branding/BRANDING/app_icon.ico" "source/flutter/windows/runner/resources/app_icon.ico"
          fi
          rm -rf branding

      # --- 3. CONFIG ---
      - name: Setup Environment Variables
        shell: bash
        run: |
          DATE_STR=$(date +'%Y.%m.%d-%H%M')
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
             VERSION_NAME="${{ github.ref_name }}_${DATE_STR}"
          else
             VERSION_NAME="custom_${{ github.event.inputs.rustdesk_ref }}_${DATE_STR}"
          fi
          VERSION_NAME=$(echo "$VERSION_NAME" | sed 's|/|-|g')
          echo "VERSION_TAG=$VERSION_NAME" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=3.24.5" >> $GITHUB_ENV

      - name: Apply Config
        shell: bash
        working-directory: source
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          if [ -n "$MY_APP_NAME" ]; then
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             find flutter -name "main.cpp" -exec sed -i "s|L\"RustDesk\"|L\"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"FileDescription\", \"RustDesk\"|VALUE \"FileDescription\", \"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"ProductName\", \"RustDesk\"|VALUE \"ProductName\", \"$MY_APP_NAME\"|g" {} +
          fi
          TARGETS=("src/config.rs" "libs/hbb_common/src/config.rs")
          for CONF in "${TARGETS[@]}"; do
            if [ -f "$CONF" ]; then
              sed -i "s|^.*pub const API_SERVER:.*$|pub const API_SERVER: \&'static str = \"$VAL_API\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVER:.*$|pub const RENDEZVOUS_SERVER: \&'static str = \"$VAL_REND\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVERS:.*$|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$VAL_REND\"];|g" "$CONF"
              sed -i "s|^.*pub const ID_SERVER:.*$|pub const ID_SERVER: \&'static str = \"$VAL_ID\";|g" "$CONF"
              sed -i "s|^.*pub const RS_PUB_KEY:.*$|pub const RS_PUB_KEY: \&'static str = \"$VAL_KEY\";|g" "$CONF"
            fi
          done

      # --- 4. BUILD TOOLS (FIX FÜR AOM/NASM FEHLER) ---
      - name: Install Build Tools (Choco)
        shell: powershell
        run: |
          # Wir installieren NASM und YASM systemweit, damit VCPKG sie findet
          choco install llvm nasm yasm -y
          
          # Pfade sicherstellen
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # --- 5. MANIFEST MODIFIZIEREN (FFMPEG ERZWINGEN) ---
      - name: Force FFmpeg in Manifest
        shell: python
        working-directory: source
        run: |
          import json
          import os

          manifest_file = "vcpkg.json"
          
          if os.path.exists(manifest_file):
              print(f"Lese {manifest_file}...")
              with open(manifest_file, "r") as f:
                  data = json.load(f)
              
              # Sicherstellen, dass dependencies existiert
              if "dependencies" not in data:
                  data["dependencies"] = []
              
              deps = data["dependencies"]
              
              # Prüfen ob ffmpeg schon drin ist
              has_ffmpeg = False
              for dep in deps:
                  if isinstance(dep, str) and dep == "ffmpeg":
                      has_ffmpeg = True
                  elif isinstance(dep, dict) and dep.get("name") == "ffmpeg":
                      has_ffmpeg = True
              
              if not has_ffmpeg:
                  print("Füge FFmpeg zu den Abhängigkeiten hinzu...")
                  # Wir fügen es mit allen Features hinzu für hwcodec
                  data["dependencies"].append({
                      "name": "ffmpeg",
                      "features": ["avcodec", "avdevice", "avfilter", "avformat", "swresample", "swscale"]
                  })
                  
                  with open(manifest_file, "w") as f:
                      json.dump(data, f, indent=4)
                  print("vcpkg.json erfolgreich aktualisiert!")
              else:
                  print("FFmpeg ist bereits im Manifest.")
          else:
              print("FEHLER: vcpkg.json nicht gefunden!")
              exit(1)

      # --- 6. VCPKG INSTALLIEREN (MANIFEST MODE) ---
      - name: Install vcpkg Dependencies
        shell: bash
        working-directory: source
        run: |
          rm -rf C:/vcpkg
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          pushd C:/vcpkg
          git reset --hard 120deac3062162151622ca4860575a33844ba10b
          ./bootstrap-vcpkg.bat
          popd
          
          echo "Installiere Abhängigkeiten aus vcpkg.json..."
          # Da wir working-directory: source haben, findet er die modifizierte vcpkg.json
          C:/vcpkg/vcpkg install --triplet x64-windows-static --x-install-root="C:/vcpkg/installed"

          # Check
          if [ -f "C:/vcpkg/installed/x64-windows-static/include/libavutil/pixfmt.h" ]; then
             echo "✅ SUCCESS: pixfmt.h gefunden!"
          else
             echo "❌ FAILURE: pixfmt.h fehlt!"
             exit 1
          fi

      # --- 7. BRIDGE ---
      - name: Generate Flutter Rust Bridge
        shell: bash
        working-directory: source
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          pushd flutter
          flutter pub get
          popd
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --rust-output src/bridge_generated.rs \
            --c-output flutter/windows/runner/bridge_generated.h

      # --- 8. BUILD ---
      - name: Build RustDesk Application
        shell: powershell
        working-directory: source
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          # Wir helfen dem Compiler, die Header zu finden
          INCLUDE: C:\vcpkg\installed\x64-windows-static\include
          LIB: C:\vcpkg\installed\x64-windows-static\lib
          LIBPATH: C:\vcpkg\installed\x64-windows-static\lib
        run: |
          Write-Host "Start Build Script..."
          
          # Pfad für NASM sicherstellen
          $env:PATH += ";C:\Program Files\NASM"

          python build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          
          $sourceDir = "flutter\build\windows\x64\runner\Release"
          if (-not (Test-Path $sourceDir)) {
            Write-Error "FEHLER: Build Output nicht gefunden!"
            exit 1
          }
          Move-Item -Path $sourceDir -Destination "rustdesk" -Force

      # --- 9. PACKEN ---
      - name: Pack Portable Executable
        shell: powershell
        working-directory: source
        run: |
          Push-Location ./libs/portable
          pip install -r requirements.txt
          
          $exeFile = Get-ChildItem -Path "../../rustdesk" -Filter "*.exe" | Select-Object -First 1
          if (-not $exeFile) { Write-Error "KEINE EXE GEFUNDEN"; exit 1 }
          
          python generate.py -f "../../rustdesk/" -o . -e "$($exeFile.Name)"
          
          Pop-Location
          
          New-Item -ItemType Directory -Path "release_output" -Force | Out-Null
          $packed = Get-ChildItem -Path "libs/portable" -Filter "*packer.exe" | Select-Object -First 1
          
          if ($packed) {
              $finalName = "./release_output/${{ secrets.APP_NAME }}_Portable_${{ env.VERSION_TAG }}.exe"
              Move-Item $packed.FullName $finalName -Force
              Write-Host "ERFOLG: $finalName"
          } else {
              Write-Error "Packen fehlgeschlagen."
              exit 1
          }

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          files: source/release_output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
