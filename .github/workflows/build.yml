name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:

# ==========================================
# JOB 1 – PREPARE SOURCE
# ==========================================
  prepare-source:
    runs-on: windows-2022
    outputs:
      version_tag: ${{ steps.vars.outputs.VERSION_TAG }}

    steps:
      - name: Clone RustDesk
        shell: bash
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git
          cd rustdesk
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          git checkout "$REF" || git checkout master
          git submodule update --init --recursive
          mv * ../
          cd ..
          rm -rf rustdesk

      - name: Set Version
        id: vars
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          DATE=$(date +'%Y-%m-%d-%H-%M')
          echo "VERSION_TAG=${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Upload Prepared Source
        uses: actions/upload-artifact@v4
        with:
          name: source-prepared
          path: .
          exclude: |
            .git
            target
            vcpkg


# ==========================================
# JOB 2 – PREPARE DEPENDENCIES (ONCE)
# ==========================================
  prepare-deps:
    needs: prepare-source
    runs-on: windows-2022

    env:
      FLUTTER_VERSION: '3.24.5'
      VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-prepared
          path: .

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install VCPKG
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          cd C:\vcpkg
          git checkout $env:VCPKG_COMMIT_ID
          .\bootstrap-vcpkg.bat
          .\vcpkg install ffmpeg:x64-windows-static
          .\vcpkg install opus:x64-windows-static
          .\vcpkg install libvpx:x64-windows-static
          .\vcpkg install libyuv:x64-windows-static
          .\vcpkg install aom:x64-windows-static

      - name: Generate Flutter Rust Bridge
        shell: pwsh
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --force
          Push-Location flutter
          flutter pub get
          Pop-Location

          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart `
            --rust-output src/bridge_generated.rs `
            --c-output flutter/windows/runner/bridge_generated.h

      - name: Upload Dependencies
        uses: actions/upload-artifact@v4
        with:
          name: shared-deps
          path: |
            C:\vcpkg
            flutter/lib/generated_bridge.dart
            src/bridge_generated.rs
            flutter/windows/runner/bridge_generated.h


# ==========================================
# JOB 3 – BUILD MATRIX
# ==========================================
  build:
    needs: [prepare-source, prepare-deps]
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        variant: [standard, qs]

    env:
      VERSION_TAG: ${{ needs.prepare-source.outputs.version_tag }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-prepared
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: shared-deps
          path: .

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Variant
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          $env:VCPKG_INSTALLATION_ROOT = "C:\vcpkg"

          if ("${{ matrix.variant }}" -eq "qs") {
            Write-Host "Applying QuickSupport modifications..."
            # optional QS patching hier
          }

          python build.py --portable --flutter --skip-portable-pack

          $buildDir = "flutter\build\windows\x64\runner\Release"
          New-Item -ItemType Directory -Path build_output -Force
          Move-Item "$buildDir\*.exe" build_output

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.variant }}
          path: build_output\*.exe


# ==========================================
# JOB 4 – RELEASE
# ==========================================
  release:
    needs: [prepare-source, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: exe-standard
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: exe-qs
          path: .

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-source.outputs.version_tag }}
          files: "*.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
