name: RustDesk Builder

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: 'RustDesk Version (Tag oder Branch)'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1 – PREPARE SOURCE
  # ==========================================
  prepare-source:
    runs-on: windows-2025
    env:
      # Globale Variablen
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      LLVM_INSTALL_PATH: C:\Program Files\LLVM
      VCPKG_ROOT: C:\vcpkg
      # WICHTIG: Damit VCPKG unsere manuell installierten Tools (NASM) findet!
      VCPKG_KEEP_ENV_VARS: "PATH;INCLUDE;LIB;LIBPATH"
    outputs:
      version_tag: ${{ steps.vars.outputs.VERSION_TAG }}
    steps:
      - name: Checkout RustDesk
        shell: bash
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk_src
          cd rustdesk_src
          REF="${{ github.event.inputs.rustdesk_ref || 'master' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
          fi
          git checkout "$REF" || git checkout master
          git submodule update --init --recursive
          cd ..

      - name: Checkout Branding Repo
        shell: bash
        run: |
          git clone "https://github.com/${{ github.repository }}.git" my_branding_src

      - name: Merge Source + Branding
        shell: bash
        run: |
          cp -r rustdesk_src/* .
          cp -r rustdesk_src/.* . 2>/dev/null || true
          if [ -d "my_branding_src/BRANDING" ]; then
            cp -r my_branding_src/BRANDING .
          fi
          rm -rf rustdesk_src my_branding_src

      - name: Set Version
        id: vars
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          DATE=$(date +'%Y-%m-%d-%H-%M')
          echo "VERSION_TAG=${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Apply Custom Branding
        shell: bash
        env:
          MY_APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          # 1. App-Namen ändern
          if [ -n "$MY_APP_NAME" ]; then
             sed -i "s|description: RustDesk|description: $MY_APP_NAME|g" flutter/pubspec.yaml
             find flutter -name "main.cpp" -exec sed -i "s|L\"RustDesk\"|L\"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"FileDescription\", \"RustDesk\"|VALUE \"FileDescription\", \"$MY_APP_NAME\"|g" {} +
             find flutter -name "Runner.rc" -exec sed -i "s|VALUE \"ProductName\", \"RustDesk\"|VALUE \"ProductName\", \"$MY_APP_NAME\"|g" {} +
          fi
          
          # 2. Logo korrigieren (Pfade angepasst!)
          if [ -f "BRANDING/logo.png" ]; then
             echo "🎨 Logo gefunden, füge in Flutter Assets ein..."
             mkdir -p flutter/assets/images
             cp "BRANDING/logo.png" "flutter/assets/images/logo.png"
             # Überschreibe zur Sicherheit alle bestehenden logo.png im flutter Ordner
             find flutter -name "logo.png" -exec cp "BRANDING/logo.png" {} + || true
          fi
          
          # 3. Icon korrigieren (Pfade angepasst!)
          if [ -f "BRANDING/app_icon.ico" ]; then
             echo "🖼️ App Icon gefunden, tausche aus..."
             mkdir -p flutter/windows/runner/resources
             cp "BRANDING/app_icon.ico" "flutter/windows/runner/resources/app_icon.ico"
             
             mkdir -p res
             cp "BRANDING/app_icon.ico" "res/icon.ico"
          fi
      
      # --- 4. SERVER CONFIGURATION ---
      - name: Inject Server Configuration
        shell: bash
        env:
          VAL_API: ${{ secrets.API_SERVER }}
          VAL_REND: ${{ secrets.RENDEZVOUS_SERVER }}
          VAL_KEY: ${{ secrets.RS_PUB_KEY }}
          VAL_ID: ${{ secrets.ID_SERVER || secrets.RENDEZVOUS_SERVER }}
        run: |
          TARGETS=("src/config.rs" "libs/hbb_common/src/config.rs")
          for CONF in "${TARGETS[@]}"; do
            if [ -f "$CONF" ]; then
              sed -i "s|^.*pub const ID_SERVER:.*$|pub const ID_SERVER: \&'static str = \"$VAL_ID\";|g" "$CONF"
              sed -i "s|^.*pub const API_SERVER:.*$|pub const API_SERVER: \&'static str = \"$VAL_API\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVER:.*$|pub const RENDEZVOUS_SERVER: \&'static str = \"$VAL_REND\";|g" "$CONF"
              sed -i "s|^.*pub const RENDEZVOUS_SERVERS:.*$|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$VAL_REND\"];|g" "$CONF"
              sed -i "s|^.*pub const RS_PUB_KEY:.*$|pub const RS_PUB_KEY: \&'static str = \"$VAL_KEY\";|g" "$CONF"
            fi
          done

      - name: Upload Prepared Source
        uses: actions/upload-artifact@v7
        with:
          name: source-prepared
          path: .
          exclude: |
            .git
            target
            vcpkg

  # ==========================================
  # JOB 2 – PREPARE DEPENDENCIES (CACHED)
  # ==========================================
  prepare-deps:
    needs: prepare-source
    runs-on: windows-2025
    env:
      FLUTTER_VERSION: '3.24.5'
      VCPKG_COMMIT_ID: '120deac306216251622ca4860575a33844ba10b'
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source-prepared
          path: .

      - name: Install Build Tools (LLVM & NASM)
        shell: powershell
        run: choco install llvm nasm -y

      - uses: ilammy/msvc-dev-cmd@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      # Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Pub
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: pub-${{ hashFiles('flutter/pubspec.lock') }}

      # --- 8a. Setup vcpkg ---
      - name: Setup vcpkg
        shell: powershell
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
          }
          cd C:\vcpkg
          git fetch
          git reset --hard 120deac3062162151622ca4860575a33844ba10b
          .\bootstrap-vcpkg.bat
      
      # --- 8b. Cache Basis-Pakete (ohne libmfx) ---
      # --- 8b. Cache Basis-Pakete ---
      - name: Cache vcpkg
        uses: actions/cache@v5
        id: cache-vcpkg
        with:
          # Wir cachen das ganze Verzeichnis, schließen aber Downloads/Buildtrees aus um Platz zu sparen
          path: |
            C:\vcpkg
            !C:\vcpkg\buildtrees
            !C:\vcpkg\downloads
            !C:\vcpkg\packages
          key: vcpkg-cache-windows-2022-static-deps-v1
      
      # --- 8c. Install vcpkg Dependencies ---
      - name: Install vcpkg Dependencies
        shell: powershell
        run: |
          cd C:\vcpkg
          # Basis-Pakete (werden ggf. aus Cache geladen)
          .\vcpkg install ffmpeg:x64-windows-static
          .\vcpkg install opus:x64-windows-static
          .\vcpkg install libvpx:x64-windows-static
          .\vcpkg install libyuv:x64-windows-static
          .\vcpkg install aom:x64-windows-static

      - name: Cache Python Pip
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('libs/portable/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-
        
      - name: Generate Flutter Rust Bridge
        shell: powershell
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          Push-Location flutter
          flutter pub get
          Pop-Location
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart --rust-output src/bridge_generated.rs --c-output flutter/windows/runner/bridge_generated.h

      - uses: actions/upload-artifact@v7
        with:
          name: shared-bridge
          path: |
            flutter/lib/generated_bridge*.dart
            src/bridge_generated*.rs

    # ==========================================
  # JOB 3 – BUILD MATRIX
  # ==========================================
  build:
    needs: [prepare-source, prepare-deps]
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, qs]
    env:
      VERSION_TAG: ${{ needs.prepare-source.outputs.version_tag }}
      FLUTTER_VERSION: '3.24.5'
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source-prepared
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: shared-bridge
          path: .

      - uses: ilammy/msvc-dev-cmd@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore VCPKG Cache
        uses: actions/cache@v5
        id: cache-vcpkg
        with:
          path: |
            C:\vcpkg
            !C:\vcpkg\buildtrees
            !C:\vcpkg\downloads
            !C:\vcpkg\packages
          key: vcpkg-cache-windows-2022-static-deps-v1
      
      - name: Check vcpkg existence
        shell: powershell
        run: |
          if (!(Test-Path "C:\vcpkg\installed\x64-windows-static\include\opus\opus.h")) {
            Write-Error "VCPKG Cache wurde nicht gefunden! Dependencies fehlen."
            exit 1
          }

      - name: Apply QuickSupport Mods (Only if QS)
        if: matrix.variant == 'qs'
        shell: bash
        env:
          QS_TARGET: ${{ secrets.QS_TARGET_ID }}
        run: |
          echo "🔧 Wende QuickSupport Modifikationen an..."
          
          # 1. Ziel-ID eintragen (Falls vorhanden)
          if [ -n "$QS_TARGET" ]; then
             echo "Setze Ziel-ID auf: $QS_TARGET"
             find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i "s|TextEditingController();|TextEditingController(text: \"$QS_TARGET\");|g"
          fi
          
          # 2. Hamburger Menu und Settings lahmlegen (Klicks laufen ins Leere)
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/Scaffold.of(context).openEndDrawer()/null/g'
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/Get.toNamed(AppRoutes.settings)/null/g'
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/Get.to(() => const SettingsPage())/null/g'
          
          # 3. Icons SICHER austauschen (nutzt \b für Wortgrenzen, damit _outlined nicht kaputt geht!)
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/\bIcons\.settings\b/Icons.check_box_outline_blank/g'
          find flutter/lib -type f -name "*.dart" -print0 | xargs -0 sed -i 's/\bIcons\.menu\b/Icons.check_box_outline_blank/g'

          echo "✅ QuickSupport Modifikationen fertig."

      - name: Build and Pack Client
        shell: pwsh
        env:
          LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"
        run: |
          $vcpkgRoot = "C:\vcpkg"
          $vcpkgInclude = "$vcpkgRoot\installed\x64-windows-static\include"
          $vcpkgLib = "$vcpkgRoot\installed\x64-windows-static\lib"
          
          $env:INCLUDE = "$vcpkgInclude;$env:INCLUDE"
          $env:LIB = "$vcpkgLib;$env:LIB"
          $env:CPATH = "$vcpkgInclude;$env:CPATH"
          $env:C_INCLUDE_PATH = "$vcpkgInclude;$env:C_INCLUDE_PATH"
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:PKG_CONFIG_PATH = "$vcpkgLib\pkgconfig;$env:PKG_CONFIG_PATH"
          $env:BINDGEN_EXTRA_CLANG_ARGS = "-I$vcpkgInclude"

          Write-Host "Starte offiziellen Build & Pack Vorgang..."
          pip install -r libs/portable/requirements.txt
          
          # Nur EINMAL aufrufen!
          python build.py --portable --flutter

          $outDir = "build_output_${{ matrix.variant }}"
          New-Item -ItemType Directory -Path $outDir -Force

          # Finalen Namen bestimmen
          $finalName = "TechnikHilfe-Loske_Portable_$env:VERSION_TAG.exe"
          if ("${{ matrix.variant }}" -eq "qs") {
            $finalName = "TechnikHilfe-Loske_Quicksupport_$env:VERSION_TAG.exe"
          }

          # Suche die fertig gepackte EXE im Hauptverzeichnis (build.py benennt sie meistens rustdesk-*-install.exe)
          Write-Host "Suche finale gepackte EXE im Hauptverzeichnis..."
          $packedExe = Get-ChildItem -Path . -Filter "rustdesk-*-install.exe" | Select-Object -First 1

          if ($packedExe) {
            Move-Item $packedExe.FullName "$outDir\$finalName" -Force
            Write-Host "✅ ERFOLG: $outDir\$finalName erstellt!"
          } else {
            Write-Error "FEHLER: build.py hat keine fertige EXE im Hauptverzeichnis hinterlassen."
            exit 1
          }

      - uses: actions/upload-artifact@v7
        with:
          name: exe-${{ matrix.variant }}
          path: build_output_${{ matrix.variant }}/*.exe

  # ==========================================
  # JOB 4 – RELEASE
  # ==========================================
  release:
    needs: [prepare-source, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: exe-standard
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: exe-qs
          path: .

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-source.outputs.version_tag }}
          # WICHTIG: Da der Tag in Git noch nicht existiert, sagen wir GitHub, 
          # dass er ihn auf dem aktuellen Commit erstellen soll:
          target_commitish: ${{ github.sha }}
          files: "*.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
